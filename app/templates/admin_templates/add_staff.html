{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
  <h2 class="mb-4 text-center">Add New Staff</h2>
  <form method="POST" enctype="multipart/form-data">
    <div class="row">
      <div class="col-md-6">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" class="form-control" name="first_name" required>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" class="form-control" name="last_name" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" class="form-control" name="email" required>
        </div>
        <div class="form-group">
          <label>Contact</label>
          <input type="text" class="form-control" name="contact" required>
        </div>
        <div class="form-group">
          <label>CNIC</label>
          <input type="text" class="form-control" name="cnic" placeholder="xxxxx-xxxxxxx-x" required>
        </div>
      </div>

      <div class="col-md-6">
        <div class="form-group">
          <label>Home Address</label>
          <input type="text" class="form-control" name="home_address" required>
        </div>
        <div class="form-group">
          <label>Role in Office</label>
          <input type="text" class="form-control" name="role_in_office" required>
        </div>
        <div class="form-group">
          <label>Join Date</label>
          <input type="date" class="form-control" name="join_date">
        </div>
        <div class="form-group">
          <label>Left Date (if any)</label>
          <input type="text" class="form-control" name="left_of_date">
        </div>
        <div class="form-group">
          <label>Profile Picture</label>
          <input type="file" class="form-control-file" name="picture">
        </div>
      </div>
    </div>
    <div class="text-center mt-4">
      <button type="submit" class="btn btn-primary">Add Staff</button>
      <a href="{{ url_for('admin_bp.manage_staff') }}" class="btn btn-secondary ml-2">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
