{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
  <h2 class="mb-4 text-center">Update Staff Information</h2>
  <form method="POST" enctype="multipart/form-data">
    <div class="row">
      <div class="col-md-6">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" class="form-control" name="first_name" value="{{ staff.first_name }}" required>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" class="form-control" name="last_name" value="{{ staff.last_name }}" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" class="form-control" name="email" value="{{ staff.email }}" required>
        </div>
        <div class="form-group">
          <label>Contact</label>
          <input type="text" class="form-control" name="contact" value="{{ staff.contact }}" required>
        </div>
        <div class="form-group">
          <label>CNIC</label>
          <input type="text" class="form-control" name="cnic" value="{{ staff.cnic }}" required>
        </div>
      </div>

      <div class="col-md-6">
        <div class="form-group">
          <label>Home Address</label>
          <input type="text" class="form-control" name="home_address" value="{{ staff.home_address }}" required>
        </div>
        <div class="form-group">
          <label>Role in Office</label>
          <input type="text" class="form-control" name="role_in_office" value="{{ staff.role_in_office }}" required>
        </div>
        <div class="form-group">
          <label>Join Date</label>
          <input type="date" class="form-control" name="join_date" value="{{ join_date_str }}">
        </div>
        <div class="form-group">
          <label>Left Date</label>
          <input type="text" class="form-control" name="left_of_date" value="{{ staff.left_of_date }}">
        </div>
        <div class="form-group">
          <label>Update Profile Picture</label>
          <input type="file" class="form-control-file" name="picture">
          {% if staff.picture %}
            <div class="mt-2">
              <p class="text-muted">Current Image:</p>
              <img src="{{ url_for('admin_bp.static', filename='admin_staff_pics/' ~ staff.picture) }}" alt="Current Image" width="120" class="img-thumbnail">
            </div>
          {% endif %}

        </div>
      </div>
    </div>
    <div class="text-center mt-4">
      <button type="submit" class="btn btn-success">Update</button>
      <a href="{{ url_for('admin_bp.manage_staff') }}" class="btn btn-secondary ml-2">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
